# Pi5 - Always On Services
# Run: docker-compose -f docker-compose.pi5.yml up -d
#
# These services run 24/7 on Pi5
# Access locally: http://pi5.local:7711
# Access remotely: via Cloudflare tunnel

services:
  # ============================================
  # SEARXNG - Web Search (Port 7711)
  # Privacy-respecting search engine
  # ============================================
  searxng:
    image: searxng/searxng:latest
    container_name: searxng
    restart: unless-stopped
    ports:
      - "7711:8080"
    volumes:
      - ./searxng-data:/etc/searxng
    environment:
      - SEARXNG_BASE_URL=http://localhost:7711/
    networks:
      - pi5-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/search?q=test"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ============================================
  # POSTGRES - Database (Port 7714)
  # ============================================
  postgres:
    image: postgres:15-alpine
    container_name: postgres
    restart: unless-stopped
    ports:
      - "7714:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=mcp_server
      - POSTGRES_USER=mcp_user
      - POSTGRES_PASSWORD=postgres
    networks:
      - pi5-network

  # ============================================
  # REDIS - Cache (Port 7715)
  # ============================================
  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    ports:
      - "7715:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    networks:
      - pi5-network

  # ============================================
  # CLOUDFLARE TUNNEL
  # Expose services via public URL
  # Run: cloudflared tunnel create mcp-server
  # Then set CLOUDFLARE_TOKEN in .env
  # ============================================
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: cloudflared
    restart: unless-stopped
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TOKEN}
    networks:
      - pi5-network
    depends_on:
      - searxng

networks:
  pi5-network:
    driver: bridge

volumes:
  searxng-data:
  postgres-data:
  redis-data:
