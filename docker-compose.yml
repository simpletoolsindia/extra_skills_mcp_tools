version: "3.8"

# MCP Unified Server - Complete Stack
# Run: docker-compose up -d
# Access: http://localhost:7711 (SearXNG)

services:
  # ============================================
  # SEARXNG - Web Search (Port 7711)
  # ============================================
  searxng:
    image: searxng/searxng:latest
    container_name: searxng
    restart: unless-stopped
    ports:
      - "7711:8080"
    volumes:
      - ./searxng-data:/etc/searxng
    environment:
      - SEARXNG_BASE_URL=http://localhost:7711/
    networks:
      - mcp-network

  # ============================================
  # LITELLM - Local LLM Gateway (Port 7713)
  # ============================================
  litellm:
    image: ghcr.io/berriai/litellm:main
    container_name: litellm
    restart: unless-stopped
    ports:
      - "7713:8000"
    environment:
      - DATABASE_URL=sqlite:///litellm.db
      - LITELLM_MASTER_KEY=sk-local
    networks:
      - mcp-network

  # ============================================
  # POSTGRES - Database (Port 7714)
  # ============================================
  postgres:
    image: postgres:15-alpine
    container_name: postgres
    restart: unless-stopped
    ports:
      - "7714:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=mcp_server
      - POSTGRES_USER=mcp_user
      - POSTGRES_PASSWORD=postgres
    networks:
      - mcp-network

  # ============================================
  # REDIS - Cache (Port 7715)
  # ============================================
  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    ports:
      - "7715:6379"
    volumes:
      - redis-data:/data
    networks:
      - mcp-network

  # ============================================
  # NGINX - Reverse Proxy (Ports 80, 443)
  # ============================================
  nginx:
    image: nginx:alpine
    container_name: nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
    depends_on:
      - searxng
      - litellm
    networks:
      - mcp-network

networks:
  mcp-network:
    driver: bridge

volumes:
  searxng-data:
  postgres-data:
  redis-data:
