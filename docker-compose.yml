version: "3.8"

services:
  # ============================================
  # PORTS (7711 onwards for MCP Server stack)
  # ============================================
  # 7711 - SearXNG (Web Search)
  # 7712 - Firecrawl API (Optional - Heavy: 4CPU, 8GB RAM)
  # 7713 - LiteLLM (LLM Gateway)
  # 7714 - PostgreSQL
  # 7715 - Redis
  # 80/443 - Nginx Reverse Proxy

  # ============================================
  # SEARXNG - Web Search Engine (Self-Hosted)
  # ============================================
  searxng:
    image: searxng/searxng:latest
    container_name: searxng
    restart: unless-stopped
    ports:
      - "7711:8080"
    volumes:
      - ./searxng-data:/etc/searxng
    environment:
      - SEARXNG_BASE_URL=https://search.sridharhomelab.in/
    networks:
      - mcp-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/search?q=test"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ============================================
  # LITELLM - LLM Gateway (Self-Hosted)
  # ============================================
  litellm:
    image: ghcr.io/berriai/litellm:main
    container_name: litellm
    restart: unless-stopped
    ports:
      - "7713:8000"
    volumes:
      - ./litellm-config:/app/config.yaml
    command: --config /app/config.yaml --port 8000
    environment:
      - DATABASE_URL=sqlite:///litellm.db
      - LITELLM_MASTER_KEY=sk-your-secure-key-here
    networks:
      - mcp-network

  # ============================================
  # POSTGRES - Database
  # ============================================
  postgres:
    image: postgres:15-alpine
    container_name: postgres
    restart: unless-stopped
    ports:
      - "7714:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=mcp_server
      - POSTGRES_USER=mcp_user
      - POSTGRES_PASSWORD=your-secure-db-password
    networks:
      - mcp-network

  # ============================================
  # REDIS - Cache
  # ============================================
  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    ports:
      - "7715:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    networks:
      - mcp-network

  # ============================================
  # NGINX - Reverse Proxy
  # ============================================
  nginx:
    image: nginx:alpine
    container_name: nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/html:/usr/share/nginx/html:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - searxng
      - litellm
    networks:
      - mcp-network

networks:
  mcp-network:
    driver: bridge

volumes:
  searxng-data:
  postgres-data:
  redis-data:
