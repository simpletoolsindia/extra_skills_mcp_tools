# Mac - MCP Server
# Connects to Pi5 for database services
# Uses local Ollama for LLM

services:
  # ============================================
  # MCP SERVER
  # Connects to:
  # - Pi5: SearXNG, PostgreSQL, Redis
  # - Mac: Ollama (localhost:11434)
  # ============================================
  mcp-server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mcp-server
    restart: unless-stopped
    ports:
      - "7710:7710"  # Remote access
    environment:
      # Pi5 services (change PI5_IP to your Pi5 IP)
      - PI5_IP=${PI5_IP:-192.168.1.100}
      - SEARXNG_BASE_URL=http://${PI5_IP:-192.168.1.100}:7711
      - POSTGRES_HOST=${PI5_IP:-192.168.1.100}
      - POSTGRES_PORT=7714
      - REDIS_HOST=${PI5_IP:-192.168.1.100}
      - REDIS_PORT=7715
      # Mac: Ollama
      - OLLAMA_HOST=host.docker.internal:11434
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      # MCP Server
      - MCP_SERVER_PORT=7710
      - PLAYWRIGHT_HEADLESS=true
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - mcp-network

networks:
  mcp-network:
    driver: bridge
