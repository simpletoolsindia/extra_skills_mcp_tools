# MCP Unified Server - Complete Stack
# Run: docker-compose up -d
# That's it! Everything runs automatically.
# Run: docker-compose up -d
# That's it! Everything runs automatically.

services:
  # ============================================
  # MCP SERVER - Your AI Tool Server
  # Connects to all services automatically
  # ============================================
  mcp-server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mcp-server
    restart: unless-stopped
    environment:
      - SEARXNG_BASE_URL=http://searxng:8080
      - FIRECRAWL_HOST=http://firecrawl:3002
      - PLAYWRIGHT_HEADLESS=true
    networks:
      - mcp-network

  # ============================================
  # SEARXNG - Web Search (Port 7711)
  # Privacy-respecting search engine
  # ============================================
  searxng:
    image: searxng/searxng:latest
    container_name: searxng
    restart: unless-stopped
    ports:
      - "7711:8080"
    volumes:
      - ./searxng-data:/etc/searxng
    environment:
      - SEARXNG_BASE_URL=http://localhost:7711/
    networks:
      - mcp-network

  # ============================================
  # LITELEM - Local LLM Gateway (Port 7713)
  # Connect to Ollama, vLLM, etc.
  # ============================================
  litellm:
    image: ghcr.io/berriai/litellm:main
    container_name: litellm
    restart: unless-stopped
    ports:
      - "7713:8000"
    environment:
      - DATABASE_URL=sqlite:///litellm.db
      - LITELLM_MASTER_KEY=sk-local
    networks:
      - mcp-network

  # ============================================
  # POSTGRES - Database (Port 7714)
  # ============================================
  postgres:
    image: postgres:15-alpine
    container_name: postgres
    restart: unless-stopped
    ports:
      - "7714:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=mcp_server
      - POSTGRES_USER=mcp_user
      - POSTGRES_PASSWORD=postgres
    networks:
      - mcp-network

  # ============================================
  # REDIS - Cache (Port 7715)
  # ============================================
  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    ports:
      - "7715:6379"
    volumes:
      - redis-data:/data
    networks:
      - mcp-network

networks:
  mcp-network:
    driver: bridge

volumes:
  searxng-data:
  postgres-data:
  redis-data:
