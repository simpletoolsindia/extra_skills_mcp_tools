# Firecrawl Self-Hosted Setup
# Usage: docker compose -f docker-compose.firecrawl.yml up -d
#
# Access:
#   API: http://localhost:3002
#   Admin: http://localhost:3002/admin/queues

version: "3.8"

services:
  # ============================================
  # PLAYWRIGHT SERVICE - Browser Automation
  # Port: 3000
  # ============================================
  playwright-service:
    image: trieve/puppeteer-service-ts:v0.0.13
    container_name: firecrawl-playwright
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - HOST=0.0.0.0
      - MAX_CONCURRENCY=5
    volumes:
      - playwright-data:/tmp/.cache
    shm_size: "2gb"
    networks:
      - firecrawl-network
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ============================================
  # FIRECRAWL API - Main API Server
  # Port: 3002
  # ============================================
  firecrawl-api:
    image: trieve/firecrawl:v0.1.36
    container_name: firecrawl-api
    restart: unless-stopped
    ports:
      - "3002:3002"
    environment:
      # Required
      - PORT=3002
      - HOST=0.0.0.0
      - USE_DB_AUTHENTICATION=false

      # Redis (no auth for local)
      - REDIS_URL=redis://redis:6379
      - REDIS_RATE_LIMIT_URL=redis://redis:6379

      # Playwright service
      - PLAYWRIGHT_MICROSERVICE_URL=http://playwright-service:3000

      # Worker settings
      - NUM_WORKERS_PER_QUEUE=4
      - CRAWL_CONCURRENT_REQUESTS=5
      - MAX_CONCURRENT_JOBS=3
      - BROWSER_POOL_SIZE=3

      # Optional: OpenAI for AI features
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}

      # Optional: Ollama for local LLM
      - OLLAMA_BASE_URL=http://host.docker.internal:11434

      # Optional: Proxy for scraping
      - PROXY_SERVER=${PROXY_SERVER:-}
      - PROXY_USERNAME=${PROXY_USERNAME:-}
      - PROXY_PASSWORD=${PROXY_PASSWORD:-}

      # Optional: API keys for testing
      - TEST_API_KEY=local-dev-key

      # Admin UI (change @ for production!)
      - BULL_AUTH_KEY=local-dev-key

      # Logging
      - LOGGING_LEVEL=INFO
    depends_on:
      redis:
        condition: service_healthy
      playwright-service:
        condition: service_healthy
    networks:
      - firecrawl-network
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3002/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ============================================
  # FIRECRAWL WORKER - Background Job Processing
  # ============================================
  firecrawl-worker:
    image: trieve/firecrawl:v0.1.36
    container_name: firecrawl-worker
    restart: unless-stopped
    environment:
      # Required
      - PORT=3002
      - HOST=0.0.0.0
      - USE_DB_AUTHENTICATION=false
      - IS_WORKER=true

      # Redis
      - REDIS_URL=redis://redis:6379
      - REDIS_RATE_LIMIT_URL=redis://redis:6379

      # Playwright service
      - PLAYWRIGHT_MICROSERVICE_URL=http://playwright-service:3000

      # Worker settings
      - NUM_WORKERS_PER_QUEUE=4
      - CRAWL_CONCURRENT_REQUESTS=5
      - MAX_CONCURRENT_JOBS=3
      - BROWSER_POOL_SIZE=3

      # OpenAI (optional)
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}

      # Ollama for local LLM
      - OLLAMA_BASE_URL=http://host.docker.internal:11434

      # Proxy (optional)
      - PROXY_SERVER=${PROXY_SERVER:-}
      - PROXY_USERNAME=${PROXY_USERNAME:-}
      - PROXY_PASSWORD=${PROXY_PASSWORD:-}

      # Admin UI
      - BULL_AUTH_KEY=local-dev-key

      # Logging
      - LOGGING_LEVEL=INFO
    depends_on:
      redis:
        condition: service_healthy
      playwright-service:
        condition: service_healthy
    networks:
      - firecrawl-network

  # ============================================
  # REDIS - Cache & Message Queue
  # Port: 6379 (internal only)
  # ============================================
  redis:
    image: redis:alpine
    container_name: firecrawl-redis
    restart: unless-stopped
    volumes:
      - redis-firecrawl-data:/data
    networks:
      - firecrawl-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  firecrawl-network:
    driver: bridge

volumes:
  playwright-data:
  redis-firecrawl-data:
