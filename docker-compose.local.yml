# Mac / Local Machine - On Demand Services
# Run: docker compose -f docker-compose.local.yml up -d
#
# Ports: 7710, 7171, 7172, 7173, 7174

services:
  # ============================================
  # MCP SERVER
  # Port: 7710 (default)
  # 86 tools for AI workflows
  # ============================================
  mcp-server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mcp-server
    restart: unless-stopped
    ports:
      - "7710:7710"
    environment:
      # Remote (Pi5) - SearXNG only
      - PI5_IP=${PI5_IP:-192.168.1.100}
      - SEARXNG_BASE_URL=http://${PI5_IP:-192.168.1.100}:7171
      # Local Ollama (host machine)
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      # Local database
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=mcp_server
      - POSTGRES_USER=mcp_user
      - POSTGRES_PASSWORD=postgres
      # Local cache
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      # Local Firecrawl
      - FIRECRAWL_HOST=http://firecrawl:3002
      # MCP
      - MCP_SERVER_PORT=7710
      - PLAYWRIGHT_HEADLESS=true
    depends_on:
      - postgres
      - redis
      - firecrawl
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - local-network

  # ============================================
  # FIRECRAWL - Web Scraping
  # Port: 7172
  # Image: mcp/firecrawl
  # ============================================
  firecrawl:
    image: mcp/firecrawl:latest
    container_name: firecrawl
    restart: unless-stopped
    ports:
      - "7172:3002"
    volumes:
      - ./firecrawl-data:/app/data
    environment:
      - PORT=3002
      - HOST=0.0.0.0
    networks:
      - local-network

  # ============================================
  # POSTGRESQL - Database
  # Port: 7173
  # ============================================
  postgres:
    image: postgres:15-alpine
    container_name: postgres
    restart: unless-stopped
    ports:
      - "7173:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=mcp_server
      - POSTGRES_USER=mcp_user
      - POSTGRES_PASSWORD=postgres
    networks:
      - local-network

  # ============================================
  # REDIS - Cache
  # Port: 7174
  # ============================================
  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    ports:
      - "7174:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    networks:
      - local-network

networks:
  local-network:
    driver: bridge

volumes:
  postgres-data:
  redis-data:
  firecrawl-data:
