# Mac / Local Machine - On Demand Services
# Run: docker compose -f docker-compose.local.yml up -d
#
# Ports: 7710, 7171, 7172, 7173, 7174

services:
  # ============================================
  # MCP SERVER
  # Port: 7710 (default)
  # 86 tools for AI workflows
  # ============================================
  mcp-server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mcp-server
    restart: unless-stopped
    ports:
      - "7710:7710"
    environment:
      # Remote (Pi5) - SearXNG
      - SEARXNG_BASE_URL=https://search.sridharhomelab.in
      # Local Ollama (host machine)
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      # Local database
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=mcp_server
      - POSTGRES_USER=mcp_user
      - POSTGRES_PASSWORD=postgres
      # Local cache
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      # Local Firecrawl
      - FIRECRAWL_HOST=http://firecrawl:3002
      # MCP
      - MCP_SERVER_PORT=7710
      - PLAYWRIGHT_HEADLESS=true
      # SSL certificates
      - SSL_CERT_FILE=/etc/ssl/certs/ca-certificates.crt
      - REQUESTS_CA_BUNDLE=/etc/ssl/certs/ca-certificates.crt
    depends_on:
      - postgres
      - redis
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - local-network

  # ============================================
  # FIRECRAWL - Web Scraping
  # Port: 3002 (external: 7172)
  # Image: trieve/firecrawl (self-hosted)
  # ============================================
  playwright-service:
    image: trieve/puppeteer-service-ts:v0.0.13
    container_name: firecrawl-playwright
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - HOST=0.0.0.0
      - MAX_CONCURRENCY=5
    volumes:
      - playwright-data:/tmp/.cache
    shm_size: "2gb"
    networks:
      - local-network
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  firecrawl-api:
    image: trieve/firecrawl:v0.0.55
    container_name: firecrawl
    restart: unless-stopped
    ports:
      - "7172:3002"
    environment:
      # Required
      - PORT=3002
      - HOST=0.0.0.0
      - USE_DB_AUTHENTICATION=false
      # Redis
      - REDIS_URL=redis://redis:6379
      - REDIS_RATE_LIMIT_URL=redis://redis:6379
      # Playwright service
      - PLAYWRIGHT_MICROSERVICE_URL=http://playwright-service:3000
      # Worker settings
      - NUM_WORKERS_PER_QUEUE=4
      - CRAWL_CONCURRENT_REQUESTS=5
      - MAX_CONCURRENT_JOBS=3
      # Ollama for local LLM
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      # API keys
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - TEST_API_KEY=local-dev-key
      # Admin UI
      - BULL_AUTH_KEY=local-dev-key
      # Logging
      - LOGGING_LEVEL=INFO
    depends_on:
      redis:
        condition: service_healthy
      playwright-service:
        condition: service_healthy
    networks:
      - local-network
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3002/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  firecrawl-worker:
    image: trieve/firecrawl:v0.0.55
    container_name: firecrawl-worker
    restart: unless-stopped
    environment:
      - PORT=3002
      - HOST=0.0.0.0
      - USE_DB_AUTHENTICATION=false
      - IS_WORKER=true
      - REDIS_URL=redis://redis:6379
      - REDIS_RATE_LIMIT_URL=redis://redis:6379
      - PLAYWRIGHT_MICROSERVICE_URL=http://playwright-service:3000
      - NUM_WORKERS_PER_QUEUE=4
      - CRAWL_CONCURRENT_REQUESTS=5
      - MAX_CONCURRENT_JOBS=3
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - BULL_AUTH_KEY=local-dev-key
      - LOGGING_LEVEL=INFO
    depends_on:
      redis:
        condition: service_healthy
      playwright-service:
        condition: service_healthy
    networks:
      - local-network

  # ============================================
  # POSTGRESQL - Database
  # Port: 7173
  # ============================================
  postgres:
    image: postgres:15-alpine
    container_name: postgres
    restart: unless-stopped
    ports:
      - "7173:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=mcp_server
      - POSTGRES_USER=mcp_user
      - POSTGRES_PASSWORD=postgres
    networks:
      - local-network

  # ============================================
  # REDIS - Cache
  # Port: 7174
  # ============================================
  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    ports:
      - "7174:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    networks:
      - local-network

  # ============================================
  # CHROMADB - Vector Database for RAG
  # Port: 8000
  # ============================================
  chromadb:
    image: chromadb/chroma:latest
    container_name: chromadb
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - chromadb-data:/chroma/chroma
    networks:
      - local-network

networks:
  local-network:
    driver: bridge

volumes:
  postgres-data:
  redis-data:
  playwright-data:
  chromadb-data:
