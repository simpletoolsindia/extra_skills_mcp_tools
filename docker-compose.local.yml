# Mac / Local Machine - On Demand Services
# Run: docker compose -f docker-compose.local.yml up -d

services:
  # ============================================
  # MCP SERVER (Port 7710)
  # 86 tools for AI workflows
  # Connects to:
  # - Remote: SearXNG, Firecrawl
  # - Local: Ollama (host), PostgreSQL, Redis
  # ============================================
  mcp-server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mcp-server
    restart: unless-stopped
    ports:
      - "7710:7710"
    environment:
      # Remote (Pi5) - Update REMOTE_IP
      - REMOTE_IP=${REMOTE_IP:-192.168.1.100}
      - SEARXNG_BASE_URL=http://${REMOTE_IP:-192.168.1.100}:7711
      - FIRECRAWL_HOST=http://${REMOTE_IP:-192.168.1.100}:7712
      # Local Ollama (on host machine)
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      # Local services
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=mcp_server
      - POSTGRES_USER=mcp_user
      - POSTGRES_PASSWORD=postgres
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      # MCP
      - MCP_SERVER_PORT=7710
      - PLAYWRIGHT_HEADLESS=true
    depends_on:
      - postgres
      - redis
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - local-network

  # ============================================
  # POSTGRESQL (Port 5432)
  # Database
  # ============================================
  postgres:
    image: postgres:15-alpine
    container_name: postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=mcp_server
      - POSTGRES_USER=mcp_user
      - POSTGRES_PASSWORD=postgres
    networks:
      - local-network

  # ============================================
  # REDIS (Port 6379)
  # Cache
  # ============================================
  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    networks:
      - local-network

networks:
  local-network:
    driver: bridge

volumes:
  postgres-data:
  redis-data:
