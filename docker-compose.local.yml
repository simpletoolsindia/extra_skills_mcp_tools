# Mac / Local Machine - On Demand Services
# Run: docker compose -f docker-compose.local.yml up -d
#
# Connects to remote services at:
# - http://YOUR_PI5_IP:8080 (SearXNG)
# - http://YOUR_PI5_IP:3002 (Firecrawl)

services:
  # ============================================
  # MCP SERVER
  # 86 tools for AI workflows
  # ============================================
  mcp-server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mcp-server
    restart: unless-stopped
    ports:
      - "7710:7710"
    environment:
      # UPDATE THIS: Your Pi5 IP address
      - PI5_IP=${PI5_IP:-192.168.1.100}
      # Remote services (Pi5)
      - SEARXNG_BASE_URL=http://${PI5_IP:-192.168.1.100}:8080
      - FIRECRAWL_HOST=http://${PI5_IP:-192.168.1.100}:3002
      # Local Ollama (host machine)
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      # Local database
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=mcp_server
      - POSTGRES_USER=mcp_user
      - POSTGRES_PASSWORD=postgres
      # Local cache
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      # MCP
      - MCP_SERVER_PORT=7710
      - PLAYWRIGHT_HEADLESS=true
    depends_on:
      - postgres
      - redis
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - local-network

  # ============================================
  # POSTGRESQL - Database
  # ============================================
  postgres:
    image: postgres:15-alpine
    container_name: postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=mcp_server
      - POSTGRES_USER=mcp_user
      - POSTGRES_PASSWORD=postgres
    networks:
      - local-network

  # ============================================
  # REDIS - Cache
  # ============================================
  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    networks:
      - local-network

networks:
  local-network:
    driver: bridge

volumes:
  postgres-data:
  redis-data:
