# LiteLLM Configuration
# Model Gateway for local LLM integration

model_list:
  # Local Ollama Models
  - model_name: llama3.2
    litellm_params:
      model: ollama/llama3.2
      api_base: http://ollama:11434
      rpm: 50
      tpm: 5000

  - model_name: qwen2.5
    litellm_params:
      model: ollama/qwen2.5
      api_base: http://ollama:11434
      rpm: 50
      tpm: 5000

  - model_name: deepseek-r1
    litellm_params:
      model: ollama/deepseek-r1
      api_base: http://ollama:11434
      rpm: 30
      tpm: 3000

  - model_name: gemma3
    litellm_params:
      model: ollama/gemma3
      api_base: http://ollama:11434
      rpm: 50
      tpm: 5000

  - model_name: mistral
    litellm_params:
      model: ollama/mistral
      api_base: http://ollama:11434
      rpm: 50
      tpm: 5000

  # Cloud fallbacks
  - model_name: gpt-4o-mini
    litellm_params:
      model: openai/gpt-4o-mini
      api_key: os.environ/OPENAI_API_KEY

  - model_name: claude-3-5-haiku
    litellm_params:
      model: vertex_ai/claude-3-5-haiku@20240620
      api_key: os.environ/VERTEXAI_API_KEY

litellm_settings:
  drop_request_timeout: 60
  num_retries: 3
  request_timeout: 120
  telemetry: false

general_settings:
  master_key: sk-your-secure-key-here
  database_url: sqlite:///litellm.db
  ui_access_mode: "admin"