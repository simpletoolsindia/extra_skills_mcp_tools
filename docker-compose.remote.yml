# Pi5 / Remote Server - Always On Services
# Run: docker compose -f docker-compose.remote.yml up -d
#
# Ports: 7171

services:
  # ============================================
  # SEARXNG - Web Search
  # Port: 7171
  # ============================================
  searxng:
    image: searxng/searxng:latest
    container_name: searxng
    restart: unless-stopped
    ports:
      - "7171:8080"
    volumes:
      - ./searxng-data:/etc/searxng
