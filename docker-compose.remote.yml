# Pi5 / Remote Server - Always On Services
# Run: docker compose -f docker-compose.remote.yml up -d
#
# Services:
# - SearXNG (port 8080)
# - Firecrawl (port 3002)

services:
  # ============================================
  # SEARXNG - Web Search
  # ============================================
  searxng:
    image: searxng/searxng:latest
    container_name: searxng
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - ./searxng-data:/etc/searxng

  # ============================================
  # FIRECRAWL - Web Scraping
  # Requires: 6 CPU + 12GB RAM
  # ============================================
  firecrawl:
    image: firecrawl/mcp-server:latest
    container_name: firecrawl
    restart: unless-stopped
    ports:
      - "3002:3002"
    volumes:
      - ./firecrawl-data:/app/data
    environment:
      - PORT=3002
      - HOST=0.0.0.0
